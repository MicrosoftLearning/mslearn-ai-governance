kind: hosted
name: citadel-governed-agent
protocols:
  - protocol: responses
    version: 1.0.0
resources:
  cpu: "1"
  memory: 2Gi
environment_variables:
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: Hub-HR-ChatAgent-DEV-LLM/gpt-4.1
  - name: ENABLE_INSTRUMENTATION
    value: "true"
  - name: ENABLE_SENSITIVE_DATA
    value: "true"
  - name: OTEL_SERVICE_NAME
    value: citadel-governed-agent
